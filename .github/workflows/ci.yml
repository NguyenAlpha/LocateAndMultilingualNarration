name: CI

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - master

jobs:
  build-backend:
    name: Build Api & Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Shared
        run: dotnet restore Shared/Shared.csproj

      - name: Restore Api
        run: dotnet restore Api/Api.csproj

      - name: Restore Web
        run: dotnet restore Web/Web.csproj

      - name: Build Shared
        run: dotnet build Shared/Shared.csproj --no-restore --configuration Release

      - name: Build Api
        run: dotnet build Api/Api.csproj --no-restore --configuration Release

      - name: Build Web
        run: dotnet build Web/Web.csproj --no-restore --configuration Release

  build-mobile:
    name: Build Mobile (Android)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore Mobile (Android only)
        run: dotnet restore Mobile/Mobile.csproj -p:TargetFramework=net10.0-android

      - name: Build Mobile (Android)
        run: dotnet build Mobile/Mobile.csproj --no-restore --configuration Release -f net10.0-android
